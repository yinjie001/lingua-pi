<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>船长译 Lingua Pi</title>
<!-- REQUIRED: Pi SDK 必须加载 -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #7B2CBF 0%, #48CAE4 100%);
    min-height: 100vh;
    padding: 20px;
    color: #1a1a1a;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #7B2CBF 0%, #48CAE4 100%);
    color: #fff;
    padding: 32px 24px;
    text-align: center;
  }
  .header h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .header .subtitle {
    font-size: 14px;
    opacity: 0.9;
    letter-spacing: 2px;
  }
  .user-bar {
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 10px 16px;
    margin-top: 16px;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .user-bar.logged { background: rgba(255,255,255,0.25); }
  .pi-login-btn {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    padding: 4px 14px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  .pi-login-btn:hover { background: rgba(255,255,255,0.3); }
  .pi-login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .main {
    padding: 24px;
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: #f4f4f8;
    border-radius: 12px;
    padding: 4px;
  }
  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: #666;
    transition: all 0.2s;
  }
  .tab.active {
    background: #fff;
    color: #7B2CBF;
    box-shadow: 0 2px 8px rgba(123,44,191,0.15);
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 8px;
  }
  textarea, select {
    width: 100%;
    padding: 14px;
    border: 2px solid #e8e8ef;
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
    transition: border-color 0.2s;
  }
  textarea:focus, select:focus {
    outline: none;
    border-color: #7B2CBF;
  }
  textarea {
    min-height: 120px;
  }
  .field {
    margin-bottom: 18px;
  }
  .row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  .row > div { flex: 1; }
  .row > button { flex: 0 0 auto; }
  .btn {
    background: linear-gradient(135deg, #7B2CBF 0%, #48CAE4 100%);
    color: #fff;
    border: none;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    width: 100%;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(123,44,191,0.3); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: #f4f4f8;
    color: #7B2CBF;
    margin-top: 10px;
  }
  .output {
    margin-top: 20px;
    padding: 18px;
    background: linear-gradient(135deg, #f8f4ff 0%, #f0fbff 100%);
    border-radius: 12px;
    border: 2px dashed #d0b0ff;
    min-height: 100px;
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .output.empty {
    color: #999;
    font-style: italic;
  }
  .copy-btn {
    background: #7B2CBF;
    color: #fff;
    border: none;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    float: right;
    margin-bottom: 8px;
  }
  .footer {
    padding: 16px 24px;
    text-align: center;
    color: #999;
    font-size: 12px;
    background: #fafafa;
  }
  .counter {
    font-size: 11px;
    color: #999;
    text-align: right;
    margin-top: 4px;
  }
  .counter.warn { color: #e63946; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>船长译</h1>
    <div class="subtitle">LINGUA PI</div>
    <div class="user-bar" id="userBar">
      <span id="authStatus">🔌 正在连接 Pi 网络...</span>
      <button id="piLoginBtn" class="pi-login-btn" style="display:none;">🔐 登录 Pi</button>
    </div>
  </div>

  <div class="main">
    <div class="tabs">
      <div class="tab active" data-tab="translate">🌍 翻译</div>
      <div class="tab" data-tab="polish">✨ 润色</div>
    </div>

    <div id="translatePanel">
      <div class="field">
        <label>输入文本</label>
        <textarea id="inputText" placeholder="输入要翻译的内容..." maxlength="2000"></textarea>
        <div class="counter"><span id="charCount">0</span> / 2000</div>
      </div>

      <div class="field row">
        <div>
          <label>源语言</label>
          <select id="srcLang">
            <option value="auto">自动检测</option>
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="ru">Русский</option>
            <option value="ar">العربية</option>
            <option value="hi">हिन्दी</option>
            <option value="pt">Português</option>
          </select>
        </div>
        <div>
          <label>目标语言</label>
          <select id="tgtLang">
            <option value="en">English</option>
            <option value="zh" selected>中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="ru">Русский</option>
            <option value="ar">العربية</option>
            <option value="hi">हिन्दी</option>
            <option value="pt">Português</option>
          </select>
        </div>
      </div>

      <button class="btn" id="translateBtn">🚀 翻译</button>
    </div>

    <div id="polishPanel" style="display:none;">
      <div class="field">
        <label>输入草稿</label>
        <textarea id="polishInput" placeholder="输入要润色的文字（邮件、文案、报告...）" maxlength="2000"></textarea>
      </div>
      <div class="field">
        <label>润色风格</label>
        <select id="polishStyle">
          <option value="formal">正式商务</option>
          <option value="casual">轻松日常</option>
          <option value="academic">学术专业</option>
          <option value="social">社交媒体</option>
          <option value="creative">创意营销</option>
        </select>
      </div>
      <button class="btn" id="polishBtn">✨ 润色</button>
    </div>

    <div class="output empty" id="output">
      <button class="copy-btn" id="copyBtn" style="display:none;">📋 复制</button>
      <span id="outputText">结果会显示在这里...</span>
    </div>
  </div>

  <div class="footer">
    🌐 Built on Pi Network · 60M+ Pioneers
  </div>
</div>

<script>
  // ============== UI 交互 ==============
  const $ = (id) => document.getElementById(id);
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    const tab = t.dataset.tab;
    $('translatePanel').style.display = tab === 'translate' ? 'block' : 'none';
    $('polishPanel').style.display = tab === 'polish' ? 'block' : 'none';
  }));

  $('inputText').addEventListener('input', e => {
    $('charCount').textContent = e.target.value.length;
  });

  function showOutput(text) {
    $('output').classList.remove('empty');
    $('outputText').textContent = text;
    $('copyBtn').style.display = 'inline-block';
  }

  $('copyBtn').addEventListener('click', () => {
    const text = $('outputText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      $('copyBtn').textContent = '✅ 已复制';
      setTimeout(() => $('copyBtn').textContent = '📋 复制', 2000);
    });
  });

  // ============== 翻译功能 ==============
  const LANG_MAP = {
    zh: 'zh', 'zh-CN': 'zh', en: 'en', ja: 'ja', ko: 'ko',
    es: 'es', fr: 'fr', de: 'de', ru: 'ru', ar: 'ar', hi: 'hi', pt: 'pt'
  };

  async function doTranslate() {
    const text = $('inputText').value.trim();
    if (!text) return alert('请输入文本');
    const src = $('srcLang').value;
    const tgt = $('tgtLang').value;

    $('translateBtn').disabled = true;
    $('translateBtn').textContent = '⏳ 翻译中...';
    showOutput('翻译中...');

    try {
      const res = await fetch('https://libretranslate.de/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          q: text,
          source: src === 'auto' ? 'auto' : LANG_MAP[src] || src,
          target: LANG_MAP[tgt] || tgt,
          format: 'text'
        })
      });
      const data = await res.json();
      if (data.translatedText) {
        showOutput(data.translatedText);
      } else {
        throw new Error(data.error || '翻译失败');
      }
    } catch (e) {
      const mock = `[${tgt.toUpperCase()}] ${text} (演示模式)`;
      showOutput(mock);
    } finally {
      $('translateBtn').disabled = false;
      $('translateBtn').textContent = '🚀 翻译';
    }
  }
  $('translateBtn').addEventListener('click', doTranslate);

  // ============== 润色功能 ==============
  const POLISH_TEMPLATES = {
    formal: (t) => `${t}\n\n[正式商务润色建议]\n- 使用敬语和正式称呼\n- 结构化分点表达\n- 添加落款和日期`,
    casual: (t) => `${t}\n\n[轻松日常版]\n更亲切、更口语化，加 emoji 会更自然 😊`,
    academic: (t) => `${t}\n\n[学术版建议]\n- 加入引用和文献支持\n- 强化论点逻辑链\n- 使用专业术语`,
    social: (t) => `${t}\n\n[社媒版]\n#话题标签 + 引发互动的问题 + 表情符号`,
    creative: (t) => `${t}\n\n[创意版]\n用故事化、感官化的语言吸引注意力`
  };

  $('polishBtn').addEventListener('click', () => {
    const text = $('polishInput').value.trim();
    if (!text) return alert('请输入草稿');
    const style = $('polishStyle').value;
    showOutput(POLISH_TEMPLATES[style](text));
  });

  // ============== Pi SDK 集成 ==============
  //
  // 官方文档要求：
  // 1. 页面加载时自动触发认证（+ 手动登录按钮作为备用）
  // 2. await Pi.init() 完全 resolve 后再调用 authenticate
  // 3. 发送 accessToken 到后端 → 后端调用 GET https://api.minepi.com/v2/me 验证
  // 4. 只请求 "username" scope
  //
  // 注意：Pi SDK 功能必须在 Pi Browser 内运行
  //

  let piUser = null;

  /**
   * 更新认证状态 UI
   */
  function setAuthStatus(msg, logged) {
    const bar = $('userBar');
    bar.classList.toggle('logged', !!logged);
    $('authStatus').innerHTML = msg;
  }

  /**
   * 后端验证 access token
   *
   * 官方要求：把 accessToken 发给你的后端，
   * 后端调用 GET https://api.minepi.com/v2/me
   *   Header: Authorization: Bearer <accessToken>
   * 无需 Pi API Key
   *
   * 后端返回示例: { uid: "...", username: "..." }
   */
  async function validateTokenWithBackend(accessToken) {
    try {
      // 把 token 发到你的后端 API 验证
      // 后端参考 (Node.js / Express):
      //
      // const response = await fetch('https://api.minepi.com/v2/me', {
      //   headers: { 'Authorization': `Bearer ${accessToken}` }
      // });
      // if (!response.ok) throw new Error('Token invalid');
      // return await response.json();
      //
      const res = await fetch('/api/auth/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accessToken })
      });

      if (!res.ok) {
        throw new Error('Token validation failed');
      }

      const data = await res.json();
      return data; // 后端返回 { uid, username } 等用户信息
    } catch (e) {
      console.error('Token validation error:', e);
      // 后端验证失败时返回 null，前端降级为"已认证但未验证"
      return null;
    }
  }

  /**
   * Pi SDK 主认证流程
   *
   * 严格按照官方示例顺序执行：
   * 1. await Pi.init(...)  — 必须等 init Promise 完成
   * 2. Pi.authenticate(...) — 获取 user + accessToken
   * 3. 发 token 到后端验证
   * 4. 验证通过后解锁功能
   */
  async function initPi() {
    // 检查 SDK 是否加载
    if (typeof window.Pi === 'undefined' || !window.Pi) {
      setAuthStatus('⚠️ 请在 Pi Browser 中打开以使用登录功能', false);
      $('piLoginBtn').style.display = 'inline-block';
      $('piLoginBtn').textContent = '🔐 登录 Pi';
      return;
    }

    try {
      // ---- 步骤 1: 初始化 SDK ----
      // await Pi.init() 必须完全 resolve 后才能调用其他 Pi SDK 方法
      // sandbox: true  — 沙盒环境（开发/测试用）
      // sandbox: false — 生产环境（正式 listing）
      await window.Pi.init({
        version: '2.0',
        sandbox: true  // 部署正式版时改为 false
      });

      // ---- 步骤 2: 认证 ----
      // onIncompletePaymentFound: 检测未完成的支付
      const authResult = await window.Pi.authenticate(
        ['username'],   // 官方要求：只请求 username scope
        function onIncompletePaymentFound(payment) {
          console.log('发现未完成支付:', payment.identifier);
          // 业务逻辑：处理中断的支付
        }
      );

      const { user, accessToken } = authResult;

      // ---- 步骤 3: 发 token 到后端验证 ----
      // 官方明确要求：不要在客户端直接信任用户数据，必须后端验证
      const backendUser = await validateTokenWithBackend(accessToken);

      if (backendUser) {
        // 后端验证成功 → 完整登录状态
        piUser = backendUser;
        setAuthStatus(`✅ ${user.username} · Pi 已连接（已验证）`, true);
        $('piLoginBtn').style.display = 'none';
      } else {
        // 后端验证失败（可能没有配置后端）
        piUser = { username: user.username };
        setAuthStatus(`⚠️ ${user.username} · Pi 已连接（验证跳过，演示模式）`, true);
        $('piLoginBtn').style.display = 'none';
      }

      console.log('Pi 登录成功:', { user, accessToken: accessToken.substring(0, 20) + '...' });

    } catch (e) {
      // ---- 错误处理 ----
      const errMsg = e && e.message ? e.message : String(e);

      if (errMsg.includes('cancelled') || errMsg.includes('cancel') || errMsg.includes('denied')) {
        // 用户主动取消 / 拒绝授权
        setAuthStatus('ℹ️ 取消登录 · 仍可以访客模式使用', false);
      } else if (errMsg.includes('Not in Pi Browser')) {
        // 不在 Pi Browser 环境中
        setAuthStatus('⚠️ 请在 Pi Browser 中打开以使用登录功能', false);
      } else {
        // 其他错误
        setAuthStatus('ℹ️ 请在 Pi Browser 中登录以获得完整功能', false);
        console.warn('Pi auth error:', errMsg);
      }

      // 显示登录按钮供手动重试
      $('piLoginBtn').style.display = 'inline-block';
      $('piLoginBtn').textContent = '🔐 登录 Pi';
    }
  }

  // ---- 步骤 4: 页面加载时自动触发认证 ----
  // 官方要求：自动触发 + 手动按钮兜底
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(initPi, 1500));
  } else {
    setTimeout(initPi, 1500);
  }

  // ---- 手动登录按钮 ----
  $('piLoginBtn').addEventListener('click', () => {
    $('piLoginBtn').disabled = true;
    $('piLoginBtn').textContent = '⏳ 登录中...';
    setAuthStatus('🔌 正在登录...', false);
    initPi().finally(() => {
      if ($('piLoginBtn').style.display !== 'none') {
        $('piLoginBtn').disabled = false;
        $('piLoginBtn').textContent = '🔐 登录 Pi';
      }
    });
  });
</script>

</body>
</html>
